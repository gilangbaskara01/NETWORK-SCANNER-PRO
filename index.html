<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Scanner Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#00ff00;
    overflow:hidden;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.container{
    max-width:800px;
    margin:50px auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:35px;
    font-weight:bold;
    text-shadow:0 0 20px #00ff00;
    margin-bottom:20px;
}

.terminal{
    border:2px solid #00ff00;
    padding:20px;
    background:rgba(0,0,0,.8);
    box-shadow:0 0 20px #00ff00;
}

.line{
    margin:8px 0;
}

.progress-box{
    margin-top:20px;
    border:1px solid #00ff00;
    height:30px;
}

.progress{
    height:100%;
    width:0%;
    background:#00ff00;
    transition:.3s;
}

.percent{
    text-align:center;
    margin-top:10px;
    font-size:20px;
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-content{
    width:90%;
    max-width:500px;
    border:2px solid #00ff00;
    background:#000;
    padding:30px;
    text-align:center;
    box-shadow:0 0 30px #00ff00;
}

.popup h2{
    color:#00ff00;
    margin-bottom:15px;
}

.popup p{
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:15px 30px;
    background:#00ff00;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">

    <div class="title">
        NETWORK SCANNER PRO
    </div>

    <div class="terminal">

        <div class="line">[✓] Initializing System...</div>

        <div class="line" id="ip">
            [•] Scanning Public IP...
        </div>

        <div class="line" id="location">
            [•] Detecting Location...
        </div>

        <div class="line" id="speed">
            [•] Measuring Connection Speed...
        </div>

        <div class="line blink" id="status">
            [•] Running Deep Network Analysis...
        </div>

        <div class="progress-box">
            <div class="progress" id="progress"></div>
        </div>

        <div class="percent" id="percent">
            0%
        </div>

    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2>✔ NETWORK VERIFIED</h2>

        <p>
            BERHASIL MASUK KE WEBSITE YANG DI LINDUNGI.
        </p>

        <a class="btn"
           href="https://gilangbaskara01.github.io/Hsltonline/">
           LOGIN
        </a>
    </div>
</div>

<script>
// MATRIX EFFECT
const canvas=document.getElementById('matrix');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=16;
const columns=canvas.width/size;

const drops=[];

for(let i=0;i<columns;i++){
    drops[i]=1;
}

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff00";
    ctx.font=size+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text=
        chars[Math.floor(Math.random()*chars.length)];

        ctx.fillText(text,i*size,drops[i]*size);

        if(
            drops[i]*size>canvas.height &&
            Math.random()>0.975
        ){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(draw,35);

// GET IP & LOCATION
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{

document.getElementById("ip").innerHTML=
"[✓] IP Address : " + data.ip;

document.getElementById("location").innerHTML=
"[✓] Location : " +
data.city + ", " +
data.country_name;

});

// CONNECTION SPEED
let speed = navigator.connection
? navigator.connection.downlink + " Mbps"
: "Unknown";

document.getElementById("speed").innerHTML=
"[✓] Connection Speed : " + speed;

// SCAN LOADING
let progress=0;

let timer=setInterval(()=>{

progress++;

document.getElementById("progress").style.width=
progress+"%";

document.getElementById("percent").innerHTML=
progress+"%";

if(progress>=100){

clearInterval(timer);

document.getElementById("status").innerHTML=
"[✓] Scan Completed Successfully";

setTimeout(()=>{
document.getElementById("popup").style.display="flex";
},1000);

}

},120);

</script>

</body>
</html>
